name: Deploy App

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Caddyfile'
      - '.github/workflows/deploy-app.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      GHCR_IMAGE: ghcr.io/sasa-fajkovic/agents-skill-eval:latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Build
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -o bin/app .

      - name: Copy binary to Droplet
        uses: appleboy/scp-action@v1.0.0
        with:
          host: 46.101.197.119
          username: deploy
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          source: "backend/bin/app,frontend/,Caddyfile"
          target: /home/deploy/app/

      - name: Provision and restart app
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 46.101.197.119
          username: deploy
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          envs: SENTRY_DSN,GHCR_IMAGE
          script: |
            set -e
            mkdir -p /home/deploy/app/caddy_data /home/deploy/app/caddy_config
            cat > /home/deploy/app/app.env <<EOF
            PORT=8080
            REDIS_ADDR=127.0.0.1:6379
            EVAL_DOCKER_IMAGE=${GHCR_IMAGE}
            SENTRY_DSN=${SENTRY_DSN}
            SENTRY_ENVIRONMENT=production
            EOF
            chmod 600 /home/deploy/app/app.env
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${GHCR_IMAGE}
            redis-cli -h 127.0.0.1 -p 6379 ping >/dev/null
            if [ -f /home/deploy/app/app.pid ] && kill -0 "$(cat /home/deploy/app/app.pid)" 2>/dev/null; then kill "$(cat /home/deploy/app/app.pid)"; fi
            cd /home/deploy/app
            nohup bash -lc 'set -a; source /home/deploy/app/app.env; set +a; exec /home/deploy/app/backend/bin/app' >/home/deploy/app/app.log 2>&1 < /dev/null &
            echo $! >/home/deploy/app/app.pid
            sleep 5
            curl -fsS http://127.0.0.1:8080/health
            docker rm -f agents-skill-eval-caddy >/dev/null 2>&1 || true
            docker run -d --name agents-skill-eval-caddy --restart unless-stopped --network host -v /home/deploy/app/Caddyfile:/etc/caddy/Caddyfile:ro -v /home/deploy/app/caddy_data:/data -v /home/deploy/app/caddy_config:/config caddy:2
            sleep 10
            curl -fsSI -H 'Host: agents-skill-eval.com' http://127.0.0.1
